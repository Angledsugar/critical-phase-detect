# TLDR encoder + triplet trainer config. Paper §3.3.

name: tldr
# LIBERO proprio = [ee_pos(3), ee_ori(3), gripper_states(2)] → 8.
# Synthetic toy used 16; switch to 8 when feeding real demos.
state_dim: 8
latent_dim: 64
hidden_dim: 128
num_layers: 3

lr: 1.0e-3
weight_decay: 0.0
batch_size: 256

epochs: 50
num_batches_per_epoch: 50

k_pos: 2
K_neg: 20
margin: 1.0

# smoke synthetic toy trajectories — overridden when real demos are passed
synthetic:
  num_trajectories: 32
  traj_length: 100
  drift: 0.05
  noise: 0.1

trajectories_path: data/tldr_demos.pkl  # 500 LIBERO-Long demos × proprio (T,8); set to null for synthetic toy
weights_path: checkpoints/tldr.pt
seed: 42

wandb:
  enabled: false
